---
version: '3'

tasks:

  :tf:
    desc: Check & apply the changes in terraform files
    cmds:
      - task: terraform-plan
      - task: terraform-apply

  terraform-plan:
    internal: true
    desc: Run terraform plan and show a concise summary
    cmds:
      - terraform plan -out=plan > /dev/null
      - bash {{.SCRIPTS_DIR}}/tf-parser.sh plan
    preconditions:
      - msg: Unsupported bash version, run `brew install bash` to upgrade
        sh: '{{if eq OS "darwin"}}test -f /opt/homebrew/bin/bash || test -f /usr/local/bin/bash{{end}}'
      - test -f {{.SCRIPTS_DIR}}/tf-parser.sh
      - which terraform
      - which jaq

  terraform-apply:
    internal: true
    desc: Apply all the terraform changes
    prompt: Are we good to apply the proposed changes?
    cmds:
      - terraform apply plan
      - rm -f plan plan.json
    status:
      - test ! -f plan
    preconditions:
      - which terraform

  destroy-talos:
    desc: Delete talos.auto.tfvars and apply
    cmds:
      - rm -f {{.TERRAFORM_DIR}}/talos.auto.tfvars
      - task: terraform-plan
      - task: terraform-apply
    status:
      - test ! -f talos.auto.tfvars
